name: Deploy to AWS (manafoundry.gg)

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC role assumption
  contents: read

concurrency:
  group: 'aws-deploy'
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          BASE_PATH: /
          VITE_ANALYTICS_URL: ${{ vars.VITE_ANALYTICS_URL }}
          VITE_TAG_REPO_URL: ${{ vars.VITE_TAG_REPO_URL }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Sync to S3
        run: aws s3 sync dist/ s3://${{ vars.SITE_BUCKET }}/ --delete

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id ${{ vars.CLOUDFRONT_ID }} --paths '/*'
